name: Static analysis

on:
  push:
    branches:
      - "master"
      - "epic/**"
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Load .env
        run: grep -v '^#' .env >> "$GITHUB_ENV"

      - name: Build dev image
        run: make dev-image

      - name: Run dialyzer
        run: make wc-dialyze

  eqwalizer:
    name: Eqwalizer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Load .env
        run: grep -v '^#' .env >> "$GITHUB_ENV"

      - name: Build dev image
        run: make dev-image

      - name: Run eqwalizer
        run: make wc-eqwalizer
